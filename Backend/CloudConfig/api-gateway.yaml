server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: FRAMEWORK
  servlet:
    context-path: ${SERVER_SERVLET_CONTEXT_PATH:/api/v1}

app:
  cors:
    enabled: ${APP_CORS_ENABLED:true}
    allowed-origins: ${APP_CORS_ORIGIN:http://localhost:4000}
    allowed-methods: ${APP_CORS_METHODS:GET,POST,PUT,DELETE,OPTIONS}
    allowed-headers: ${APP_CORS_ALLOWED_HEADERS:*}
    exposed-headers: ${APP_CORS_EXPOSED_HEADERS:Authorization,Access-Control-Allow-Origin,Access-Control-Allow-Credentials}
    allow-credentials: ${APP_CORS_CREDENTIALS:true}
    max-age: ${APP_CORS_MAX_AGE:3600}
  gateway:
    strip-prefix: ${APP_GATEWAY_STRIP_PREFIX:1}
  cookie:
    secure: ${APP_COOKIE_SECURE:true}
    refreshToken:
      path: ${APP_COOKIE_REFRESH_TOKEN_PATH:/api}
      expiration: ${APP_COOKIE_REFRESH_TOKEN_EXPIRATION:259200}
    accessToken:
      path: ${APP_COOKIE_ACCESS_TOKEN_PATH:/}
      expiration: ${APP_COOKIE_ACCESS_TOKEN_EXPIRATION:3600}
  jwt:
    refreshTokenExpiration: 259200
    accessTokenExpiration: 3600

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      default-filters:
        - PreserveHostHeader
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      mvc:
        http-client:
          type: autodetect
          connect-timeout: 60s
          read-timeout: 60s

logging:
  level:
    com:
      Ecommerce:
        APIGateway: DEBUG

management:
  tracing:
    export:
      zipkin:
        endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/v2/spans}
        enabled: ${ZIPKIN_ENABLE:true}
